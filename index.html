村
<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>村の自己紹介 - 不思議の国</title>

  <!-- フォント -->
  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Playfair+Display&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Playfair Display', serif;
      background: linear-gradient(to bottom, #f8f4ff, #fff0f5);
      overflow-x: hidden;
      color: #333;
    }

    /* 背景（城＆庭園） */
    body::before {
      content: "";
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: url('https://images.unsplash.com/photo-1501785888041-af3ef285b470?auto=format&fit=crop&w=1400&q=60') center/cover no-repeat;
      opacity: 0.15;
      z-index: 0;
      filter: blur(2px);
    }

    header {
      font-family: 'Great Vibes', cursive;
      background: #6a5acd;
      color: white;
      text-align: center;
      padding: 25px;
      font-size: 2.5em;
      position: relative;
      z-index: 2;
    }

    .container {
      max-width: 800px;
      margin: auto;
      padding: 20px;
      position: relative;
      z-index: 2;
    }

    .card {
      background: rgba(255,255,255,0.9);
      border-radius: 15px;
      padding: 20px;
      margin-bottom: 20px;
      border: 3px dashed #9370db;
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
      position: relative;
    }

    .card::before {
      content: "♠ ♥ ♣ ♦";
      position: absolute;
      top: -10px;
      right: 15px;
      color: #ff4d4d;
    }

    h2 { color: #6a5acd; }

    .tag {
      display: inline-block;
      background: #add8e6;
      padding: 6px 12px;
      border-radius: 12px;
      margin: 5px;
      border: 2px solid #6a5acd;
    }

    footer {
      text-align: center;
      padding: 15px;
      background: #6a5acd;
      color: white;
      position: relative;
      z-index: 2;
    }

    /* 時計 */
    .clock {
      width: 120px;
      height: 120px;
      border: 5px solid #6a5acd;
      border-radius: 50%;
      margin: 20px auto;
      position: relative;
      background: white;
      z-index: 2;
    }

    .hand {
      position: absolute;
      width: 50%;
      height: 2px;
      background: #333;
      top: 50%;
      transform-origin: 100%;
    }

    .hour { height: 4px; width: 35%; left: 15%; animation: rotateHour 43200s linear infinite; }
    .minute { animation: rotateMinute 3600s linear infinite; }
    .second { background: red; animation: rotateSecond 60s linear infinite; }

    @keyframes rotateSecond { from { transform: rotate(0deg);} to { transform: rotate(360deg);} }
    @keyframes rotateMinute { from { transform: rotate(0deg);} to { transform: rotate(360deg);} }
    @keyframes rotateHour { from { transform: rotate(0deg);} to { transform: rotate(360deg);} }

    /* 落下エフェクト */
    .fall {
      position: fixed;
      top: -50px;
      font-size: 20px;
      animation: fall linear infinite;
      z-index: 1;
      opacity: 0.8;
    }

    @keyframes fall {
      to { transform: translateY(110vh) rotate(360deg); }
    }

  </style>
</head>
<body>

<header>
  🕰️ 村のワンダーランドプロフィール 🐇
</header>

<div class="clock">
  <div class="hand hour"></div>
  <div class="hand minute"></div>
  <div class="hand second"></div>
</div>

<script>
  const symbols = ['♠','♥','♣','♦','🌸','🌹'];

  function createFall() {
    const el = document.createElement('div');
    el.className = 'fall';
    el.innerText = symbols[Math.floor(Math.random() * symbols.length)];
    el.style.left = Math.random() * 100 + 'vw';
    el.style.animationDuration = (3 + Math.random() * 5) + 's';
    el.style.fontSize = (15 + Math.random() * 20) + 'px';
    document.body.appendChild(el);

    setTimeout(() => el.remove(), 8000);
  }

  setInterval(createFall, 300);
</script>

<div class="container">

  <div class="card">
    <h2>🎩 名前</h2>
    <p>村（むら）です！</p>
  </div>

  <div class="card">
    <h2>🐇 自己紹介</h2>
    <p>
      不思議な庭園とお城に囲まれた世界を、
      のんびり旅している村です。
    </p>
  </div>

  <div class="card">
    <h2>♣ 好きなもの</h2>
    <div class="tag">お菓子</div>
    <div class="tag">ティータイム</div>
    <div class="tag">ゲーム</div>
    <div class="tag">幻想世界</div>
  </div>

  <div class="card">
    <h2>🫖 メッセージ</h2>
    <p>
      見てくれてありがとう！
      この不思議な世界でゆっくりしていってね✨
    </p>
  </div>

</div>

<footer>
  Wonderland by 村
</footer>

</body>
</html>
